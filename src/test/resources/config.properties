# Environment
base.url=https://www.saucedemo.com/

# Execution
# local | grid | cloud
execution.mode=local

# Browser
browser=chrome
browser.headless=true
browser.start.maximized=true
browser.disable.notifications=true
browser.disable.popup.blocking=true

# Timeouts
wait.timeout=10

# Retry
retry.enabled=false
retry.count=1
retry.delay.ms=2000
