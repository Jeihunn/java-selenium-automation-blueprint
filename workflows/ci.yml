# GitHub Actions workflow for running UI automation tests
# and publishing the latest Allure report to GitHub Pages
name: UI Automation Tests & Allure Report

on:
  workflow_dispatch:
    inputs:
      browser:
        description: Select browser for test execution
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - edge
      dataprovider_threads:
        description: Parallel test threads (allowed 1-10)
        required: true
        default: 2
        type: number
      test_tags:
        description: Cucumber tag expression filter. Leave empty to run the full suite
        required: false
        default: ''
        type: string
  # schedule:
  #   # Runs once a week at 02:00 AM (UTC)
  #   - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  build_and_test:
    name: Run Tests and Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java 21 (LTS)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Verify Java version
      - name: Verify Java version
        run: java -version

      - name: Validate workflow inputs
        shell: bash
        run: |
          threads='${{ inputs.dataprovider_threads }}'

          if (( threads < 1 || threads > 10 )); then
            echo "DATAPROVIDER_THREADS must be between 1 and 10. Received: ${threads}"
            exit 1
          fi

      - name: Create .env file
        shell: bash
        run: |
          cat <<'EOF' > .env
          ${{ secrets.AUTOMATION_ENV_FILE }}
          EOF

      # Run UI tests with manual workflow parameters
      - name: Run UI tests
        run: |
          mvn clean test \
            -Dexecution.mode=local \
            -Dbrowser=${{ inputs.browser }} \
            -Dbrowser.headless=true \
            -Ddataproviderthreadcount=${{ inputs.dataprovider_threads }} \
            -Dcucumber.filter.tags='${{ inputs.test_tags }}'

      - name: Cleanup .env
        if: always()
        shell: bash
        run: rm -f .env

      # Upload test artifacts
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-run-${{ github.run_number }}
          retention-days: 1
          path: |
            target/allure-results
            target/cucumber-reports

      # Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.36.0
          wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/${ALLURE_VERSION}/allure-commandline-${ALLURE_VERSION}.zip
          unzip -q allure-commandline-${ALLURE_VERSION}.zip
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      # Generate Allure HTML report
      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate target/allure-results -o target/allure-report --clean

      # Publish Allure report to GitHub Pages
      - name: Publish latest Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report
          keep_files: false

      # Slack Notification
      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "UI Automation Test Report",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🧪 UI Automation Test Report"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* `${{ job.status }}`\n*Browser:* `${{ inputs.browser }}`"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status != 'success'
                      && '*⚠️ Some tests failed. Please review the Allure report for details.*'
                      || '*All tests executed successfully.*'
                    }}"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository*\n`${{ github.repository }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*\n`${{ github.ref_name }}`"
                    }
                  ]
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📊 *Allure Report:* <https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/|Open Report>\n🔗 *GitHub Actions Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open Workflow Run>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Sent by GitHub Actions • QA Automation"
                    }
                  ]
                }
              ]
            }
